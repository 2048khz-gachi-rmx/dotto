services:
  dotto:
    container_name: dotto
    image: "ghcr.io/2048khz-gachi-rmx/dotto:latest"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - dotto
    volumes:
      # Optional: place your Netscape-format cookies file at ./dotto_resources/ytdlp-cookies.txt
      # NOTE: read-write (no :ro) because yt-dlp writes refreshed session cookies back into the file.
      - ./dotto_resources:/app/resources
    environment:
      ConnectionString: "User ID=${POSTGRES_USER}; Password=${POSTGRES_PASSWORD}; Host=postgres; Port=5999; Database=dotto"
      # Optional Netscape-format cookies file for yt-dlp. Drop it into ./dotto_resources/ytdlp-cookies.txt
      # next to this file; mounted read-write so yt-dlp can update cookies. If the file is absent, the bot runs without cookies.
      Downloader__CookieFile: "/app/resources/ytdlp-cookies.txt"

  postgres:
    container_name: dotto_postgres
    image: postgres:17
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: 'dotto'
      PGDATA: /data/postgres
      PGPORT: 5999
    volumes:
       - postgres:/data/postgres
    ports:
      - "${POSTGRES_PUBLIC_PORT}:5999"
    networks:
      - dotto
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

networks:
  dotto:

volumes:
    postgres: